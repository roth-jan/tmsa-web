services:
  db:
    image: postgres:16-alpine
    container_name: tmsa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tmsa
      POSTGRES_USER: tmsa
      POSTGRES_PASSWORD: tmsa2026
    ports:
      - "5432:5432"
    volumes:
      - tmsa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmsa"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: tmsa-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tmsa:tmsa2026@db:5432/tmsa
      SESSION_SECRET: ${SESSION_SECRET:-tmsa-production-secret-change-me}
      CORS_ORIGIN: http://localhost
      NODE_ENV: production
      PORT: 3001
      # EDI-Verzeichnisse
      EDI_WATCH_DIR: /data/edi-eingang
      EDI_ARCHIV_DIR: /data/edi-archiv
      EDI_FEHLER_DIR: /data/edi-fehler
      EDI_AUSGANG_DIR: /data/edi-ausgang
      EDI_INTERVAL: "300000"
      # SMTP (optional)
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: 587
      # SMTP_USER: user@example.com
      # SMTP_PASS: secret
      # MAIL_FROM: tmsa@example.com
    volumes:
      - tmsa-backups:/data/backups
      - tmsa-edi-eingang:/data/edi-eingang
      - tmsa-edi-archiv:/data/edi-archiv
      - tmsa-edi-fehler:/data/edi-fehler
      - tmsa-edi-ausgang:/data/edi-ausgang
    # Port nur intern für nginx erreichbar, nicht nach außen exposen
    # ports:
    #   - "3001:3001"

  frontend:
    build: ./frontend
    container_name: tmsa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  tmsa-pgdata:
  tmsa-backups:
  tmsa-edi-eingang:
  tmsa-edi-archiv:
  tmsa-edi-fehler:
  tmsa-edi-ausgang:
